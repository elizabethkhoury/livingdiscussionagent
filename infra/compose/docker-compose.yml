services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: reddit-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reddit_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: reddit-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  temporal:
    image: temporalio/auto-setup:1.26.2
    container_name: reddit-agent-temporal
    depends_on:
      - postgres
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: reddit-agent-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"

  metabase:
    image: metabase/metabase:latest
    container_name: reddit-agent-metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data

volumes:
  postgres-data:
  metabase-data:
